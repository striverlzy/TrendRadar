    # 东方财富、第一财经、财联社补充源
    - id: "eastmoney-finance"
      name: "热点-东方财富-财经要闻"
      url: "https://rss.eastmoney.com/news/finance.xml"
      interval: 300
      enabled: true

    - id: "yicai-main"
      name: "热点-第一财经-要闻"
      url: "https://www.yicai.com/rss/"
      interval: 300
      enabled: true

    - id: "cls-telegraph"
      name: "热点-财联社-电报"
      url: "https://rsshub.app/cls/telegraph"
      interval: 60
      enabled: true

# ===============================================================
# 5. 报告模式
# ===============================================================
report:
  mode: "current"
  display_mode: "keyword"
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 8

# ===============================================================
# 6. 筛选策略
# ===============================================================
filter:
  method: "keyword"
  priority_sort_enabled: true

# ===============================================================
# 7. AI 智能筛选配置
# ===============================================================
ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.7
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

# ===============================================================
# 8. 推送内容控制
# ===============================================================
display:
  region_order:
    - rss
    - new_items
    - hotlist
    - ai_analysis
    - standalone

  regions:
    hotlist: true
    new_items: true
    rss: true
    standalone: false
    ai_analysis: true

  standalone:
    platforms:
      - "cls-hot"
      - "wallstreetcn-hot"
      - "zhihu"
    rss_feeds: []
    max_items: 20

# ===============================================================
# 9. 推送通知
# 钉钉关键词：热点
# 注意：钉钉机器人设置了关键词，所以推送内容必须包含“热点”
# ===============================================================
notification:
  enabled: true

  channels:
    feishu:
      webhook_url: ""

    dingtalk:
      webhook_url: "https://oapi.dingtalk.com/robot/send?access_token=39b937e98e1ac368f97d5a80b8a93b0697214a24febc6561fc6bd90cdf13d2a1"

    wework:
      webhook_url: ""
      msg_type: "markdown"

    telegram:
      bot_token: ""
      chat_id: ""

    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""

    ntfy:
      server_url: "https://ntfy.sh"
      topic: "trendradar-finance-yuwu5067"
      token: ""

    bark:
      url: ""

    slack:
      webhook_url: ""

    generic_webhook:
      webhook_url: ""
      payload_template: ""

# ===============================================================
# 10. 存储配置
# ===============================================================
storage:
  backend: "auto"

  formats:
    sqlite: true
    txt: false
    html: true

  local:
    data_dir: "output"
    retention_days: 30

  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""

  pull:
    enabled: false
    days: 7

# ===============================================================
# 11. AI 模型配置
# ===============================================================
ai:
  model: "deepseek/deepseek-v4-flash"
  api_key: ""
  api_base: ""
  timeout: 120
  temperature: 0.7
  max_tokens: 5000
  num_retries: 2
  fallback_models: []

# ===============================================================
# 12. AI 分析功能
# ===============================================================
ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: true
  include_standalone: true
  include_rank_timeline: true

# ===============================================================
# 13. AI 翻译功能
# ===============================================================
ai_translation:
  enabled: true
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"

  scope:
    hotlist: false
    rss: true
    standalone: true

# ===============================================================
# 14. 高级设置
# ===============================================================
advanced:
  debug: false

  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"

  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"

  rss:
    request_interval: 1000
    timeout: 20
    use_proxy: false
    proxy_url: ""

  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1

  max_accounts_per_channel: 3

  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000

  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
