# ===============================================================
# TrendRadar config.yaml
# 新浪财经 + 雪球 RSSHub + 钉钉推送版
# 钉钉关键词：热点
# ===============================================================

# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  timezone: "Asia/Shanghai"
  show_version_update: true

# ===============================================================
# 2. 调度系统
# ===============================================================
schedule:
  enabled: true
  preset: "full_day" # morning_evening / work_hours / full_day

# ===============================================================
# 3. 热榜平台
# ===============================================================
platforms:
  enabled: true
  sources:
    - id: "cls-hot"
      name: "热点-财联社热门"

    - id: "wallstreetcn-hot"
      name: "热点-华尔街见闻"

    - id: "toutiao"
      name: "热点-今日头条"

    - id: "baidu"
      name: "热点-百度热搜"

    - id: "weibo"
      name: "热点-微博"

    - id: "zhihu"
      name: "热点-知乎"

# ===============================================================
# 4. RSS 订阅源
# ===============================================================
rss:
  enabled: true

  freshness_filter:
    enabled: true
    max_age_days: 1

  feeds:
    # ===========================================================
    # 新浪财经官方 RSS
    # 来源：新浪财经 OPML
    # ===========================================================

    - id: "sina-finance-hot"
      name: "热点-新浪财经-财经要闻汇总"
      url: "http://rss.sina.com.cn/roll/finance/hot_roll.xml"
      interval: 300
      enabled: true

    - id: "sina-finance-focus"
      name: "热点-新浪财经-焦点新闻"
      url: "http://rss.sina.com.cn/news/allnews/finance.xml"
      interval: 300
      enabled: true

    - id: "sina-finance-jsy"
      name: "热点-新浪财经-股市及时雨"
      url: "http://rss.sina.com.cn/finance/jsy.xml"
      interval: 180
      enabled: true

    - id: "sina-stock-hot"
      name: "热点-新浪财经-股票要闻汇总"
      url: "http://rss.sina.com.cn/roll/stock/hot_roll.xml"
      interval: 180
      enabled: true

    - id: "sina-fund"
      name: "热点-新浪财经-基金要闻"
      url: "http://rss.sina.com.cn/finance/fund.xml"
      interval: 600
      enabled: true

    - id: "sina-financial"
      name: "热点-新浪财经-理财要闻"
      url: "http://rss.sina.com.cn/finance/financial.xml"
      interval: 600
      enabled: true

    - id: "sina-usstock"
      name: "热点-新浪财经-美股快报"
      url: "http://rss.sina.com.cn/finance/usstock.xml"
      interval: 300
      enabled: true

    - id: "sina-hkstock"
      name: "热点-新浪财经-港股快讯"
      url: "http://rss.sina.com.cn/finance/hkstock.xml"
      interval: 300
      enabled: true

    - id: "sina-future"
      name: "热点-新浪财经-期货要闻"
      url: "http://rss.sina.com.cn/finance/future.xml"
      interval: 600
      enabled: true

    # ===========================================================
    # 新浪财经 7x24 快讯，RSSHub 转换源
    # ===========================================================

    - id: "sina-finance-7x24"
      name: "热点-新浪财经-7x24快讯"
      url: "https://rsshub.app/sina/finance/7x24"
      interval: 60
      enabled: true

    # ===========================================================
    # 雪球 RSSHub
    # 说明：雪球不建议依赖官方 RSS，这里使用 RSSHub
    # 股票代码格式：
    # 沪市：SH600519
    # 深市：SZ300750
    # ===========================================================

    - id: "xueqiu-hots"
      name: "热点-雪球-热帖"
      url: "https://rsshub.app/xueqiu/hots"
      interval: 600
      enabled: true

    # 贵州茅台 SH600519
